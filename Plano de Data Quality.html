document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

91, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{ box-sizing:border-box; }\n  body{ margin:0; }\n  em{ font-style:normal; }\n<\u002Fstyle>\n<script src=\"3a14b22b-83ab-46f4-8f69-d804e20a5174\"><\u002Fscript>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n<!-- ═══════════════════════ SLIDE 1 — MÉTRICAS DE DATA QUALITY (25%) ═══════════════════════ -->\n<section data-label=\"Métricas\" data-screen-label=\"Slide 01 — Métricas de DQ\" data-speaker-notes=\"Três métricas exatas de DQ, selecionadas de 3 dos 6 pilares do curso (Completude, Consistência, Precisão) — os que falham no German Credit. Cada uma tem threshold operacional e conexão direta com acurácia e justiça do modelo de crédito. Âncora de negócio: Equifax 2022, erro na transformação de dados de crédito = US$725M e scores errados para 300 mil clientes. DQ é ofensor do P&amp;L.\" style=\"width:1920px; height:1080px; background:#F4F6F8; box-sizing:border-box; padding:50px 60px 0; font-family:'IBM Plex Sans',sans-serif; color:#0E1F30; display:flex; flex-direction:column; position:relative;\">\n\n  <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.18em; color:#5B7691; text-transform:uppercase;\">\n    <span>Métricas de Data Quality<span style=\"color:#C3CBD4;\"> · <\u002Fspan>3 dos 6 pilares, operacionalizados<\u002Fspan>\n    <span style=\"background:#0E1F30; color:#fff; padding:5px 12px; border-radius:4px; letter-spacing:.13em;\">01 / 03<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:40px; margin-top:16px;\">\n    <div style=\"flex:1;\">\n      <h1 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:53px; line-height:1.04; margin:0; letter-spacing:-.015em;\">Três métricas que ligam <em style=\"color:#0F9486; font-weight:400;\">qualidade<\u002Fem> à justiça do crédito<\u002Fh1>\n      <p style=\"font-size:18px; line-height:1.5; color:#2D4663; margin:12px 0 0; max-width:1020px;\">A auditoria do caso é clara: os dados de treino estavam <strong style=\"font-weight:600; color:#0E1F30;\">incompletos e desbalanceados<\u002Fstrong>, comprometendo <strong style=\"font-weight:600; color:#0E1F30;\">acurácia e justiça<\u002Fstrong>. No German Credit isso se confirma — o viés não é defeito do modelo, é defeito de <strong style=\"font-weight:600; color:#0E1F30;\">dado<\u002Fstrong>. Cada métrica abaixo carrega um <strong style=\"font-weight:600; color:#0E1F30;\">threshold operacional<\u002Fstrong> e conecta-se ao impacto da má qualidade no desempenho e na justiça do modelo.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"width:430px; background:#0E1F30; border-radius:8px; padding:16px 20px; flex-shrink:0;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.16em; color:#5B7691;\">O CUSTO DO BAD DATA · CRÉDITO<\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:12px; margin-top:6px;\">\n        <span style=\"font-family:'Fraunces',serif; font-weight:500; font-size:42px; color:#fff; line-height:1;\">US$ 725 mi<\u002Fspan>\n        <span style=\"font-size:13px; color:#8FA6BC; line-height:1.25;\">Equifax, 2022<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:13.5px; line-height:1.4; color:#C8D2DC; margin-top:8px;\">Um erro na <strong style=\"color:#fff; font-weight:600;\">transformação de dados de crédito<\u002Fstrong> gerou scores incorretos (≥20 pts) para <strong style=\"color:#fff; font-weight:600;\">300 mil clientes<\u002Fstrong>. DQ é ofensor do P&amp;L, não tema técnico.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 6-pillar selector -->\n  <div style=\"margin-top:18px;\">\n    <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:7px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.16em; color:#8A9AAB;\">OS 6 PILARES DA QUALIDADE — SELECIONAMOS OS 3 QUE FALHAM NO GERMAN CREDIT<\u002Fspan>\n      <span style=\"height:1px; flex:1; background:#D8DDE3;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:8px;\">\n      <div style=\"flex:1; background:#fff; border:1px solid #E0E4E9; border-radius:5px; padding:8px 12px; opacity:.5;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:#5B7691; letter-spacing:.04em;\">ATUALIDADE<\u002Fdiv><div style=\"font-size:11px; color:#8A9AAB; margin-top:1px;\">está atualizado?<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1.32; background:#0F9486; border:1px solid #0F9486; border-radius:5px; padding:8px 12px;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:#fff; letter-spacing:.04em;\">PRECISÃO ✓<\u002Fdiv><div style=\"font-size:11px; color:#BDEDE6; margin-top:1px;\">está correto — e igual entre grupos?<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1.32; background:#0F9486; border:1px solid #0F9486; border-radius:5px; padding:8px 12px;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:#fff; letter-spacing:.04em;\">COMPLETUDE ✓<\u002Fdiv><div style=\"font-size:11px; color:#BDEDE6; margin-top:1px;\">está completo por subgrupo?<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1.32; background:#0F9486; border:1px solid #0F9486; border-radius:5px; padding:8px 12px;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:#fff; letter-spacing:.04em;\">CONSISTÊNCIA ✓<\u002Fdiv><div style=\"font-size:11px; color:#BDEDE6; margin-top:1px;\">segue o domínio válido?<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; background:#fff; border:1px solid #E0E4E9; border-radius:5px; padding:8px 12px; opacity:.5;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:#5B7691; letter-spacing:.04em;\">CONFORMIDADE<\u002Fdiv><div style=\"font-size:11px; color:#8A9AAB; margin-top:1px;\">existe um padrão?<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; background:#fff; border:1px solid #E0E4E9; border-radius:5px; padding:8px 12px; opacity:.5;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:#5B7691; letter-spacing:.04em;\">INTEGRIDADE<\u002Fdiv><div style=\"font-size:11px; color:#8A9AAB; margin-top:1px;\">conecta a outros dados?<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 3 metric cards -->\n  <div style=\"display:flex; gap:18px; margin-top:18px; flex:1;\">\n\n    <!-- Card 01 — Completude -->\n    <div style=\"flex:1; background:#fff; border:1px solid #D8DDE3; border-radius:7px; padding:20px 22px 18px; display:flex; flex-direction:column; justify-content:space-between;\">\n      <div style=\"display:flex; align-items:center; justify-content:space-between; padding-bottom:13px; border-bottom:1px solid #EDF0F3;\">\n        <div style=\"display:flex; align-items:baseline; gap:11px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#14B8A6;\">01<\u002Fspan>\n          <span style=\"font-size:21px; font-weight:600; line-height:1.1;\">Completude representacional<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; color:#0F9486; background:#EAF8F5; padding:3px 8px; border-radius:3px;\">PILAR · COMPLETUDE<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:15px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">MEDE<\u002Fdiv>\n        <div style=\"font-size:15.5px; line-height:1.46; color:#2D4663; margin-top:4px;\">Menor <strong style=\"color:#0E1F30; font-weight:600;\">cobertura de subgrupo<\u002Fstrong> protegido vs. população de referência — não é % de não-nulos (P5). Hoje: feminino <strong style=\"color:#0E1F30; font-weight:600;\">31,0%<\u002Fstrong>, jovem &lt;25 <strong style=\"color:#0E1F30; font-weight:600;\">14,9%<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px; background:#EAF8F5; border-left:3px solid #14B8A6; padding:11px 13px; border-radius:0 4px 4px 0;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em; color:#0F9486;\">LIMITE OPERACIONAL<\u002Fdiv>\n        <div style=\"font-size:14.5px; line-height:1.4; color:#0E1F30; margin-top:3px;\">cobertura ≥ 30% por subgrupo protegido — <em style=\"font-family:'JetBrains Mono',monospace; font-size:13px;\">coverage_min: 0.30<\u002Fem> (policy.yaml).<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">IMPACTO NO MODELO DE CRÉDITO<\u002Fdiv>\n        <div style=\"font-size:15px; line-height:1.46; color:#2D4663; margin-top:4px;\">Sub-representação → o modelo subajusta a minoria → erro e injustiça concentrados nela. É <strong style=\"color:#0E1F30; font-weight:600;\">causa<\u002Fstrong>, não sintoma.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding-top:14px;\">\n        <div style=\"background:#FBECEC; border:1px solid #EBC4C4; border-radius:6px; padding:10px 13px; display:flex; align-items:center; gap:10px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#C0504D; white-space:nowrap;\">✕ REPROVA<\u002Fspan>\n          <span style=\"font-size:13.5px; line-height:1.35; color:#3A2426;\">No dado cru: jovem &lt;25 em <strong style=\"font-weight:600; color:#0E1F30;\">14,9%<\u002Fstrong> — abaixo de <em style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">coverage_min 0.30<\u002Fem>.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Card 02 — Consistência -->\n    <div style=\"flex:1; background:#fff; border:1px solid #D8DDE3; border-radius:7px; padding:20px 22px 18px; display:flex; flex-direction:column; justify-content:space-between;\">\n      <div style=\"display:flex; align-items:center; justify-content:space-between; padding-bottom:13px; border-bottom:1px solid #EDF0F3;\">\n        <div style=\"display:flex; align-items:baseline; gap:11px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#14B8A6;\">02<\u002Fspan>\n          <span style=\"font-size:21px; font-weight:600; line-height:1.1;\">Consistência de domínio<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; color:#0F9486; background:#EAF8F5; padding:3px 8px; border-radius:3px;\">PILAR · CONSISTÊNCIA<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:15px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">MEDE<\u002Fdiv>\n        <div style=\"font-size:15.5px; line-height:1.46; color:#2D4663; margin-top:4px;\">% de valores no domínio válido, categorias fora do dicionário e anomalias de range. O literal <em style=\"font-family:'JetBrains Mono',monospace; font-size:14px;\">NA<\u002Fem> é tratado como ausência explícita — nunca como categoria legítima.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px; background:#EAF8F5; border-left:3px solid #14B8A6; padding:11px 13px; border-radius:0 4px 4px 0;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em; color:#0F9486;\">LIMITE OPERACIONAL<\u002Fdiv>\n        <div style=\"font-size:14.5px; line-height:1.4; color:#0E1F30; margin-top:3px;\">violação de domínio ≤ 5% — <em style=\"font-family:'JetBrains Mono',monospace; font-size:13px;\">domain_violation_max: 0.05<\u002Fem> · 0 categorias não-mapeadas em colunas sensíveis.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">IMPACTO NO MODELO DE CRÉDITO<\u002Fdiv>\n        <div style=\"font-size:15px; line-height:1.46; color:#2D4663; margin-top:4px;\"><em style=\"font-family:'JetBrains Mono',monospace; font-size:14px;\">NA<\u002Fem> lido como categoria vira <strong style=\"color:#0E1F30; font-weight:600;\">proxy espúrio<\u002Fstrong> que o modelo correlaciona ao grupo → discriminação por artefato de dado; e, como categoria fantasma, injeta ruído que derruba a <strong style=\"color:#0E1F30; font-weight:600;\">acurácia<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding-top:14px;\">\n        <div style=\"background:#FBECEC; border:1px solid #EBC4C4; border-radius:6px; padding:10px 13px; display:flex; align-items:center; gap:10px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#C0504D; white-space:nowrap;\">✕ REPROVA<\u002Fspan>\n          <span style=\"font-size:13.5px; line-height:1.35; color:#3A2426;\">No dado cru: checking <strong style=\"font-weight:600; color:#0E1F30;\">39,4%<\u002Fstrong> e saving <strong style=\"font-weight:600; color:#0E1F30;\">18,3%<\u002Fstrong> em <em style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">NA<\u002Fem> — ausência como categoria.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Card 03 — Precisão (diferencial) -->\n    <div style=\"flex:1; background:#fff; border:1px solid #14B8A6; border-radius:7px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 10px 30px -14px rgba(15,148,134,.45);\">\n      <div style=\"background:#0F9486; color:#fff; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.17em; padding:5px 22px;\">O DIFERENCIAL DO PLANO — QUALIDADE × EQUIDADE<\u002Fdiv>\n      <div style=\"padding:15px 22px 18px; display:flex; flex-direction:column; flex:1; justify-content:space-between;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; padding-bottom:13px; border-bottom:1px solid #EDF0F3;\">\n          <div style=\"display:flex; align-items:baseline; gap:11px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#0F9486;\">03<\u002Fspan>\n            <span style=\"font-size:21px; font-weight:600; line-height:1.1;\">Acurácia + disparidade de taxa-base<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; color:#0F9486; background:#EAF8F5; padding:3px 8px; border-radius:3px;\">PILAR · PRECISÃO<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:13px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">MEDE<\u002Fdiv>\n          <div style=\"font-size:15.5px; line-height:1.46; color:#2D4663; margin-top:4px;\">Gap de taxa-base “bad” entre subgrupos + <em style=\"font-family:'JetBrains Mono',monospace; font-size:14px;\">disparate impact ratio<\u002Fem> medido no modelo-sonda (LogReg, seed 42).<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px; background:#EAF8F5; border-left:3px solid #14B8A6; padding:11px 13px; border-radius:0 4px 4px 0;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em; color:#0F9486;\">LIMITE OPERACIONAL<\u002Fdiv>\n          <div style=\"font-size:14.5px; line-height:1.4; color:#0E1F30; margin-top:3px;\">gap de taxa-base ≤ 10 p.p. (<em style=\"font-family:'JetBrains Mono',monospace; font-size:13px;\">base_rate_gap_max: 0.10<\u002Fem>) · disparate impact ≥ 0,80 — regra dos 80%.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">IMPACTO NO MODELO DE CRÉDITO<\u002Fdiv>\n          <div style=\"font-size:15px; line-height:1.46; color:#2D4663; margin-top:4px;\">Rótulo histórico enviesado → o modelo aprende e <strong style=\"color:#0E1F30; font-weight:600;\">amplifica<\u002Fstrong> a injustiça. A acurácia agregada mascara o subgrupo.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding-top:14px;\">\n          <div style=\"background:#FBECEC; border:1px solid #EBC4C4; border-radius:6px; padding:10px 13px; display:flex; align-items:center; gap:10px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#C0504D; white-space:nowrap;\">✕ REPROVA<\u002Fspan>\n            <span style=\"font-size:13.5px; line-height:1.35; color:#3A2426;\">No dado cru: jovem &lt;25 <strong style=\"font-weight:600; color:#0E1F30;\">40,9%<\u002Fstrong> vs ≥25 28,1% — gap <strong style=\"font-weight:600; color:#0E1F30;\">12,9 p.p.<\u002Fstrong> &gt; 10 (DI 0,82, à beira de 0,80).<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div style=\"padding:13px 0 16px; margin-top:14px; border-top:1px solid #D8DDE3; display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.13em; color:#9AA7B4; text-transform:uppercase;\">\n    <span>Plano de Melhoria de Data Quality · Dataset German Credit (Statlog)<\u002Fspan>\n    <span style=\"color:#0F9486; text-transform:none; letter-spacing:.02em; font-weight:600;\">↗ Treine estes conceitos ao vivo · fairgate-eight.vercel.app<\u002Fspan>\n    <span>fairgate · 01<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════ SLIDE 2 — MITIGAÇÃO DE VIÉS (30%) ═══════════════════════ -->\n<section data-label=\"Mitigação\" data-screen-label=\"Slide 02 — Mitigação de viés\" data-speaker-notes=\"Diagnóstico da raiz usando a taxonomia do curso: o German Credit sofre de Viés Histórico (desigualdade herdada) e Viés de Seleção (subgrupo sub-representado). Duas ações técnicas de engenharia atacam a raiz no dataset: reponderação Kamiran-Calders e imputação estratificada. Cada uma nomeia o trade-off (rebalanceamento vs. perda de sinal preditivo). A curva mostra a fronteira acurácia×justiça. Medimos o ganho contra policy.yaml com Fairlearn: disparate impact ≥ 0,80 e demographic parity difference ≤ 0,10. A ordem importa: corrigir representação antes de reponderar.\" style=\"width:1920px; height:1080px; background:#F4F6F8; box-sizing:border-box; padding:50px 60px 0; font-family:'IBM Plex Sans',sans-serif; color:#0E1F30; display:flex; flex-direction:column; position:relative;\">\n\n  <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.18em; color:#5B7691; text-transform:uppercase;\">\n    <span>Mitigação de Viés<span style=\"color:#C3CBD4;\"> · <\u002Fspan>Ações técnicas de engenharia de dados<\u002Fspan>\n    <span style=\"background:#0E1F30; color:#fff; padding:5px 12px; border-radius:4px; letter-spacing:.13em;\">02 / 03<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:40px; margin-top:16px;\">\n    <div style=\"flex:1;\">\n      <h1 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:53px; line-height:1.04; margin:0; letter-spacing:-.015em;\">Duas ações — e o <em style=\"color:#0F9486; font-weight:400;\">trade-off<\u002Fem> de cada uma<\u002Fh1>\n      <p style=\"font-size:18px; line-height:1.5; color:#2D4663; margin:12px 0 0; max-width:1080px;\">Mitigar viés é escolher <strong style=\"font-weight:600; color:#0E1F30;\">onde pagar o custo<\u002Fstrong>: toda correção move a fronteira acurácia × justiça. As ações atacam a raiz do viés demográfico <strong style=\"font-weight:600; color:#0E1F30;\">no dataset<\u002Fstrong> — não no fim do modelo.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"flex-shrink:0; display:flex; flex-direction:column; gap:7px; align-items:flex-end;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em; color:#8A9AAB;\">RAIZ DIAGNOSTICADA (TAXONOMIA DE VIÉS)<\u002Fspan>\n      <div style=\"display:flex; gap:9px;\">\n        <span style=\"font-size:14px; font-weight:600; color:#2D4663; background:#fff; border:1px solid #B9C4CF; padding:6px 13px; border-radius:5px; display:flex; align-items:center; gap:7px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#C0504D; display:inline-block;\"><\u002Fspan>Viés Histórico<\u002Fspan>\n        <span style=\"font-size:14px; font-weight:600; color:#2D4663; background:#fff; border:1px solid #B9C4CF; padding:6px 13px; border-radius:5px; display:flex; align-items:center; gap:7px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#C0504D; display:inline-block;\"><\u002Fspan>Viés de Seleção<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- two action cards -->\n  <div style=\"display:flex; gap:18px; margin-top:18px; flex:1.18;\">\n\n    <!-- Ação 01 -->\n    <div style=\"flex:1; background:#fff; border:1px solid #D8DDE3; border-radius:7px; padding:20px 24px 18px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:center; gap:13px; padding-bottom:14px; border-bottom:1px solid #EDF0F3;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:#fff; background:#14B8A6; padding:4px 10px; border-radius:4px; letter-spacing:.1em;\">AÇÃO 01<\u002Fspan>\n        <span style=\"font-size:22px; font-weight:600; line-height:1.1;\">Reponderação estratégica <span style=\"color:#5B7691; font-weight:400;\">(Kamiran–Calders)<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:22px; margin-top:15px;\">\n        <div style=\"flex:1;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">O QUE<\u002Fdiv>\n          <div style=\"font-size:15.5px; line-height:1.48; color:#2D4663; margin-top:4px;\">Atribuir <strong style=\"color:#0E1F30; font-weight:600;\">pesos por instância<\u002Fstrong> para equalizar P(bom | grupo) entre privilegiado e protegido — em vez de duplicar ou sintetizar linhas.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">COMO<\u002Fdiv>\n          <div style=\"font-size:15.5px; line-height:1.48; color:#2D4663; margin-top:4px;\">Peso <em style=\"font-family:'JetBrains Mono',monospace; font-size:13px;\">w(g,y)=P(g)·P(y)/P(g,y)<\u002Fem> por célula; treinar com <em style=\"font-family:'JetBrains Mono',monospace; font-size:14px;\">sample_weight<\u002Fem>. SMOTE preterido (ruído sintético).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:15px; background:#FBF3EC; border-left:3px solid #D98E5A; padding:11px 13px; border-radius:0 4px 4px 0;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em; color:#B96F36;\">TRADE-OFF · O QUE SE PERDE<\u002Fdiv>\n        <div style=\"font-size:14.5px; line-height:1.46; color:#3A2C20; margin-top:4px;\">Reweighing preserva o dado real mas desloca a fronteira: <strong style=\"font-weight:600;\">fairness ↑, acurácia ↓<\u002Fstrong> de forma medível — redistribui ênfase, não cria informação. SMOTE infla a minoria com pontos sintéticos → ruído e <strong style=\"font-weight:600;\">queda de AUC (perda de sinal preditivo)<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px; display:flex; align-items:flex-start; gap:9px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.15em; color:#0F9486; padding-top:2px;\">QUANDO<\u002Fspan>\n        <span style=\"font-size:14.5px; line-height:1.42; color:#2D4663;\">Dado escasso e real (1.000 linhas): preservar a amostra real &gt; fabricar sintético.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto; padding-top:14px; display:flex; gap:10px;\">\n        <div style=\"flex:1; background:#EAF8F5; border:1px solid #B4E6DD; border-radius:6px; padding:9px 12px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.13em; color:#0F9486;\">GAP TAXA-BASE &lt;25<\u002Fdiv>\n          <div style=\"font-size:16px; font-weight:600; color:#0E1F30; margin-top:2px;\">12,9pp <span style=\"color:#8A9AAB;\">→<\u002Fspan> <span style=\"color:#0F9486;\">≤10pp<\u002Fspan> <span style=\"font-size:12px; color:#0F9486; font-weight:500;\">✓ alvo<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1; background:#FBF3EC; border:1px solid #E8D2BE; border-radius:6px; padding:9px 12px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.13em; color:#B96F36;\">ACURÁCIA<\u002Fdiv>\n          <div style=\"font-size:16px; font-weight:600; color:#0E1F30; margin-top:2px;\">▼ custo aceito <span style=\"font-size:12px; color:#B96F36; font-weight:500;\">esperado<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Ação 02 -->\n    <div style=\"flex:1; background:#fff; border:1px solid #D8DDE3; border-radius:7px; padding:20px 24px 18px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:center; gap:13px; padding-bottom:14px; border-bottom:1px solid #EDF0F3;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:#fff; background:#14B8A6; padding:4px 10px; border-radius:4px; letter-spacing:.1em;\">AÇÃO 02<\u002Fspan>\n        <span style=\"font-size:22px; font-weight:600; line-height:1.1;\">Imputação estratificada <span style=\"color:#5B7691; font-weight:400;\">por grupo<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:22px; margin-top:15px;\">\n        <div style=\"flex:1;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">O QUE<\u002Fdiv>\n          <div style=\"font-size:15.5px; line-height:1.48; color:#2D4663; margin-top:4px;\">Ao imputar o NA de conta (checking <strong style=\"color:#0E1F30; font-weight:600;\">39,4%<\u002Fstrong>, saving <strong style=\"color:#0E1F30; font-weight:600;\">18,3%<\u002Fstrong>), imputar <strong style=\"color:#0E1F30; font-weight:600;\">estratificado por grupo<\u002Fstrong> — nunca pela moda global, que apaga a estrutura do subgrupo.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.17em; color:#8A9AAB;\">COMO<\u002Fdiv>\n          <div style=\"font-size:15.5px; line-height:1.48; color:#2D4663; margin-top:4px;\">Imputação condicional por (grupo, faixa) com a flag virando <em>feature<\u002Fem> — <em style=\"font-family:'JetBrains Mono',monospace; font-size:14px;\">missingness-as-signal<\u002Fem>.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:15px; background:#FBF3EC; border-left:3px solid #D98E5A; padding:11px 13px; border-radius:0 4px 4px 0;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em; color:#B96F36;\">TRADE-OFF · O QUE SE PERDE<\u002Fdiv>\n        <div style=\"font-size:14.5px; line-height:1.46; color:#3A2C20; margin-top:4px;\">Imputar pela moda global <strong style=\"font-weight:600;\">enviesa contra a minoria<\u002Fstrong> (injeta o padrão do grupo majoritário). Condicional ao grupo preserva estrutura mas <strong style=\"font-weight:600;\">arrisca reforçar estereótipo<\u002Fstrong> (codifica o grupo na feature) → contido pela flag de missingness + auditoria. MICE/KNN preterido: custa interpretabilidade e auditabilidade.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px; display:flex; align-items:flex-start; gap:9px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.15em; color:#0F9486; padding-top:2px;\">QUANDO<\u002Fspan>\n        <span style=\"font-size:14.5px; line-height:1.42; color:#2D4663;\">NA não-aleatório (MNAR) correlacionado ao grupo — o caso do checking account.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto; padding-top:14px; display:flex; gap:10px;\">\n        <div style=\"flex:1; background:#EAF8F5; border:1px solid #B4E6DD; border-radius:6px; padding:9px 12px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.13em; color:#0F9486;\">CHECKING NA<\u002Fdiv>\n          <div style=\"font-size:16px; font-weight:600; color:#0E1F30; margin-top:2px;\">39,4% <span style=\"color:#8A9AAB;\">→<\u002Fspan> <span style=\"color:#0F9486;\">0%<\u002Fspan> <span style=\"font-size:12px; color:#0F9486; font-weight:500;\">✓ + flag<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1; background:#EAF8F5; border:1px solid #B4E6DD; border-radius:6px; padding:9px 12px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.13em; color:#0F9486;\">SINAL MNAR<\u002Fdiv>\n          <div style=\"font-size:16px; font-weight:600; color:#0E1F30; margin-top:2px;\">preservado <span style=\"font-size:12px; color:#0F9486; font-weight:500;\">✓ vira feature<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- bottom band: trade-off curve + measurement + order -->\n  <div style=\"display:flex; gap:18px; margin-top:18px; flex:1;\">\n\n    <!-- trade-off curve -->\n    <div style=\"width:430px; background:#fff; border:1px solid #D8DDE3; border-radius:7px; padding:14px 18px; display:flex; gap:14px; align-items:center;\">\n      <svg viewBox=\"0 0 240 196\" style=\"width:218px; height:178px; flex-shrink:0;\">\n        <rect x=\"40\" y=\"14\" width=\"64\" height=\"160\" fill=\"#FBECEC\" opacity=\"0.6\"><\u002Frect>\n        <rect x=\"104\" y=\"14\" width=\"124\" height=\"160\" fill=\"#EAF8F5\" opacity=\"0.7\"><\u002Frect>\n        <line x1=\"40\" y1=\"174\" x2=\"228\" y2=\"174\" stroke=\"#B9C4CF\" stroke-width=\"1.5\"><\u002Fline>\n        <line x1=\"40\" y1=\"174\" x2=\"40\" y2=\"14\" stroke=\"#B9C4CF\" stroke-width=\"1.5\"><\u002Fline>\n        <line x1=\"104\" y1=\"14\" x2=\"104\" y2=\"174\" stroke=\"#C0504D\" stroke-width=\"1.5\" stroke-dasharray=\"4 3\"><\u002Fline>\n        <path d=\"M 56 36 Q 130 56 214 150\" fill=\"none\" stroke=\"#2D4663\" stroke-width=\"2\"><\u002Fpath>\n        <circle cx=\"74\" cy=\"44\" r=\"6.5\" fill=\"#C0504D\"><\u002Fcircle>\n        <circle cx=\"150\" cy=\"86\" r=\"6.5\" fill=\"#0F9486\"><\u002Fcircle>\n        <path d=\"M 80 49 L 142 81\" stroke=\"#5B7691\" stroke-width=\"1.4\" stroke-dasharray=\"3 2\" marker-end=\"url(#ar)\"><\u002Fpath>\n        <defs><marker id=\"ar\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3.5\" orient=\"auto\"><path d=\"M0,0 L6,3.5 L0,7 Z\" fill=\"#5B7691\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n        <text x=\"110\" y=\"28\" font-family=\"JetBrains Mono, monospace\" font-size=\"9\" fill=\"#C0504D\" font-weight=\"600\">DI ≥ 0,80<\u002Ftext>\n        <text x=\"58\" y=\"44\" font-family=\"JetBrains Mono, monospace\" font-size=\"9\" fill=\"#C0504D\" font-weight=\"600\">pré<\u002Ftext>\n        <text x=\"158\" y=\"84\" font-family=\"JetBrains Mono, monospace\" font-size=\"9\" fill=\"#0F9486\" font-weight=\"600\">pós<\u002Ftext>\n        <text x=\"134\" y=\"190\" font-family=\"JetBrains Mono, monospace\" font-size=\"8.5\" fill=\"#5B7691\">Justiça (paridade) →<\u002Ftext>\n        <text x=\"20\" y=\"96\" font-family=\"JetBrains Mono, monospace\" font-size=\"8.5\" fill=\"#5B7691\" transform=\"rotate(-90 20 96)\">Acurácia →<\u002Ftext>\n      <\u002Fsvg>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em; color:#0F9486;\">FRONTEIRA ACURÁCIA × JUSTIÇA<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.45; color:#2D4663; margin-top:6px;\">O ponto <strong style=\"color:#C0504D; font-weight:600;\">pré<\u002Fstrong> reprova no gap de taxa-base. A mitigação move para o ponto <strong style=\"color:#0F9486; font-weight:600;\">pós<\u002Fstrong>: respeita o limite com a <strong style=\"color:#0E1F30; font-weight:600;\">menor perda de acurácia<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- measured with -->\n    <div style=\"flex:1; background:#fff; border:1px solid #D8DDE3; border-radius:7px; padding:16px 20px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em; color:#8A9AAB; margin-bottom:10px;\">O GANHO É MEDIDO CONTRA policy.yaml — FAIRLEARN<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:9px;\">\n        <div style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"font-size:15px; font-weight:600; color:#0E1F30; min-width:210px;\">Disparate Impact ratio<\u002Fspan><span style=\"font-size:14px; color:#5B7691; line-height:1.35;\">≥ 0,80 · medido &lt;25: <strong style=\"color:#0E1F30;\">0,82<\u002Fstrong><\u002Fspan><\u002Fdiv>\n        <div style=\"height:1px; background:#EDF0F3;\"><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"font-size:15px; font-weight:600; color:#0E1F30; min-width:210px;\">Base-rate gap<\u002Fspan><span style=\"font-size:14px; color:#C0504D; line-height:1.35;\">≤ 0,10 · medido: <strong>0,129 ✗<\u002Fstrong><\u002Fspan><\u002Fdiv>\n        <div style=\"height:1px; background:#EDF0F3;\"><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"font-size:15px; font-weight:600; color:#0E1F30; min-width:210px;\">Demographic Parity Difference<\u002Fspan><span style=\"font-size:14px; color:#5B7691; line-height:1.35;\">≤ 0,10 entre grupos<\u002Fspan><\u002Fdiv>\n        <div style=\"height:1px; background:#EDF0F3;\"><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:center; padding-top:2px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#0F9486; padding:4px 9px; border-radius:4px;\">Fairlearn<\u002Fspan><span style=\"font-size:13.5px; color:#5B7691; line-height:1.35;\"><em style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">MetricFrame<\u002Fem> · determinístico, seed 42<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- order matters -->\n    <div style=\"width:380px; background:#0E1F30; border-radius:7px; padding:16px 20px; display:flex; flex-direction:column; justify-content:center;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.16em; color:#14B8A6;\">A ORDEM IMPORTA<\u002Fdiv>\n      <div style=\"font-size:15.5px; line-height:1.5; color:#D8DDE3; margin-top:8px;\">Corrigir a representação (<strong style=\"color:#fff; font-weight:600;\">Ação 02<\u002Fstrong>) <em>antes<\u002Fem> de reponderar (<strong style=\"color:#fff; font-weight:600;\">Ação 01<\u002Fstrong>) evita reponderar sobre dado já enviesado na origem.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div style=\"padding:13px 0 16px; margin-top:14px; border-top:1px solid #D8DDE3; display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.13em; color:#9AA7B4; text-transform:uppercase;\">\n    <span>Plano de Melhoria de Data Quality · Dataset German Credit (Statlog)<\u002Fspan>\n    <span style=\"color:#0F9486; text-transform:none; letter-spacing:.02em; font-weight:600;\">↗ Treine estes conceitos ao vivo · fairgate-eight.vercel.app<\u002Fspan>\n    <span>fairgate · 02<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════ SLIDE 3 — DATA VALIDATION AUTOMATIZADA (30%) ═══════════════════════ -->\n<section data-label=\"Validação\" data-screen-label=\"Slide 03 — Data Validation / DataOps\" data-speaker-notes=\"Arquitetura de validação contínua: um gate executável que reprova a ingestão e bloqueia o treino ANTES do modelo — como a segurança que confere o documento na entrada. Sete checagens (alcance, tipo, formato, consistência, unicidade, existência, integridade referencial) viram o contrato de schema executável em Pandera. Alertas em dois níveis, papéis RACI, e a curva de maturidade analítica de 5 níveis posicionando o fairgate em N3→N4. Sem validação não há escala — só escala de erro. Link do artefato ao vivo.\" style=\"width:1920px; height:1080px; background:#F4F6F8; box-sizing:border-box; padding:50px 60px 0; font-family:'IBM Plex Sans',sans-serif; color:#0E1F30; display:flex; flex-direction:column; position:relative;\">\n\n  <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.18em; color:#5B7691; text-transform:uppercase;\">\n    <span>Data Validation Automatizada<span style=\"color:#C3CBD4;\"> · <\u002Fspan>DataOps<\u002Fspan>\n    <span style=\"background:#0E1F30; color:#fff; padding:5px 12px; border-radius:4px; letter-spacing:.13em;\">03 / 03<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:16px;\">\n    <h1 style=\"font-family:'Fraunces',serif; font-weight:300; font-size:53px; line-height:1.04; margin:0; letter-spacing:-.015em;\">Um <em style=\"color:#0F9486; font-weight:400;\">gate<\u002Fem> que bloqueia, não um relatório que sugere<\u002Fh1>\n    <p style=\"font-size:18px; line-height:1.5; color:#2D4663; margin:12px 0 0; max-width:1320px;\">A validação não é revisão manual — é um <strong style=\"font-weight:600; color:#0E1F30;\">data contract executável<\u002Fstrong> que reprova a ingestão e suspen
